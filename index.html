<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Devotion Rating</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af8a;
            --dark-plum: #4a3a52;
            --light-cream: #f5f1ed;
            --warm-blush: #c49b8d;
            --deep-burgundy: #6b3e47;
            --accent-gold: #e8d4b8;
            --text-dark: #2c2624;
            --text-light: #8b7b75;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--light-cream) 0%, #ede8e3 100%);
            font-family: 'Lora', serif;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(212, 175, 138, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(107, 62, 71, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            color: var(--dark-plum);
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: var(--text-light);
            font-size: 1.1em;
            font-style: italic;
            margin-bottom: 5px;
        }

        .header .subtext {
            color: var(--warm-blush);
            font-size: 0.95em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        /* Rating Section */
        .rating-section {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 138, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .rating-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            color: var(--dark-plum);
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* Star Rating Slider */
        .star-input-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .star-display {
            display: flex;
            gap: 12px;
            justify-content: center;
            min-height: 60px;
            align-items: center;
        }

        .star {
            font-size: 2.5em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
            user-select: none;
        }

        .star:hover {
            transform: scale(1.15) translateY(-4px);
            filter: drop-shadow(0 6px 12px rgba(212, 175, 138, 0.4));
        }

        .star.empty {
            opacity: 0.3;
            color: var(--text-light);
        }

        .star.filled {
            opacity: 1;
            color: var(--gold);
            animation: starPulse 0.5s ease-out;
        }

        @keyframes starPulse {
            0% {
                transform: scale(0.8);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Slider */
        .slider-container {
            margin: 30px 0;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: linear-gradient(to right,
                var(--text-light),
                var(--warm-blush),
                var(--gold));
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(212, 175, 138, 0.5);
            transition: all 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 6px 16px rgba(212, 175, 138, 0.7);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 12px rgba(212, 175, 138, 0.5);
            transition: all 0.3s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 6px 16px rgba(212, 175, 138, 0.7);
        }

        .rating-value {
            text-align: center;
            margin-top: 15px;
            font-size: 1.1em;
            color: var(--warm-blush);
            font-weight: 600;
        }

        /* Date Display */
        .date-display {
            text-align: center;
            color: var(--text-light);
            font-size: 0.95em;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Submit Button */
        .submit-btn {
            background: linear-gradient(135deg, var(--gold) 0%, var(--warm-blush) 100%);
            color: var(--text-dark);
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-family: 'Playfair Display', serif;
            font-size: 1.1em;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 6px 20px rgba(212, 175, 138, 0.4);
            font-weight: 600;
            align-self: center;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 138, 0.6);
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(212, 175, 138, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Stats Section */
        .stats-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 138, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .stat-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2em;
            color: var(--dark-plum);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* Stats Content */
        .stats-content {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
            flex: 1;
            min-width: 100px;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: var(--gold);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Timeline */
        .timeline {
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .timeline::-webkit-scrollbar {
            width: 6px;
        }

        .timeline::-webkit-scrollbar-track {
            background: rgba(212, 175, 138, 0.1);
            border-radius: 10px;
        }

        .timeline::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(212, 175, 138, 0.2);
            animation: slideInLeft 0.5s ease-out backwards;
        }

        .timeline-item:last-child {
            border-bottom: none;
        }

        .timeline-date {
            color: var(--text-light);
            font-size: 0.85em;
            min-width: 80px;
            font-weight: 600;
        }

        .timeline-stars {
            display: flex;
            gap: 4px;
            font-size: 1.2em;
        }

        .timeline-stars .star {
            cursor: default;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .header h1 {
                font-size: 2em;
            }

            .rating-section {
                padding: 30px;
            }

            .stat-card {
                padding: 25px;
            }

            .star {
                font-size: 2em;
            }

            .rating-label {
                font-size: 1.1em;
            }
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--warm-blush) 100%);
            color: var(--text-dark);
            padding: 16px 24px;
            border-radius: 50px;
            box-shadow: 0 8px 24px rgba(212, 175, 138, 0.4);
            animation: slideUp 0.5s ease-out, slideDown 0.5s ease-out 2.5s forwards;
            font-size: 0.95em;
            font-weight: 600;
            letter-spacing: 0.5px;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(30px);
            }
        }

        .empty-state {
            text-align: center;
            color: var(--text-light);
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Daily Devotion</h1>
            <p>A measure of dedication</p>
            <div class="subtext">From Becky With Care</div>
        </div>

        <div class="main">
            <div class="rating-section">
                <div class="date-display" id="dateDisplay"></div>
                <div class="rating-label">Rate Today</div>

                <div class="star-input-wrapper">
                    <div class="star-display" id="starDisplay"></div>
                </div>

                <div class="slider-container">
                    <input type="range" id="ratingSlider" min="0" max="5" value="0" step="1">
                    <div class="rating-value"><span id="ratingValue">0</span> / 5</div>
                </div>

                <button class="submit-btn" id="submitBtn">Submit Rating</button>
            </div>

            <div class="stats-section">
                <div class="stat-card">
                    <h2>Summary</h2>
                    <div class="stats-content">
                        <div class="stat-item">
                            <div class="stat-number" id="totalRatings">0</div>
                            <div class="stat-label">Total Ratings</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="averageRating">0.0</div>
                            <div class="stat-label">Average</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="totalStars">0</div>
                            <div class="stat-label">Total Stars</div>
                        </div>
                    </div>
                </div>

                <div class="stat-card">
                    <h2>Recent Ratings</h2>
                    <div class="timeline" id="timeline">
                        <div class="empty-state">No ratings yet. Submit one to begin.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class RatingApp {
            constructor() {
                this.ratings = this.loadRatings();
                this.currentRating = 0;
                this.init();
            }

            init() {
                this.setupElements();
                this.setupEventListeners();
                this.updateDisplay();
                this.updateDate();
            }

            setupElements() {
                this.sliderEl = document.getElementById('ratingSlider');
                this.ratingValueEl = document.getElementById('ratingValue');
                this.starDisplayEl = document.getElementById('starDisplay');
                this.submitBtn = document.getElementById('submitBtn');
                this.timelineEl = document.getElementById('timeline');
                this.totalRatingsEl = document.getElementById('totalRatings');
                this.averageRatingEl = document.getElementById('averageRating');
                this.totalStarsEl = document.getElementById('totalStars');
                this.dateDisplayEl = document.getElementById('dateDisplay');
            }

            setupEventListeners() {
                this.sliderEl.addEventListener('input', (e) => this.handleSliderChange(e));
                this.submitBtn.addEventListener('click', () => this.submitRating());
                window.addEventListener('load', () => this.renderStars());
            }

            handleSliderChange(e) {
                this.currentRating = parseInt(e.target.value);
                this.ratingValueEl.textContent = this.currentRating;
                this.renderStars();
            }

            renderStars() {
                this.starDisplayEl.innerHTML = '';
                for (let i = 1; i <= 5; i++) {
                    const star = document.createElement('span');
                    star.className = `star ${i <= this.currentRating ? 'filled' : 'empty'}`;
                    star.textContent = '★';
                    star.addEventListener('click', () => {
                        this.currentRating = i;
                        this.sliderEl.value = i;
                        this.ratingValueEl.textContent = i;
                        this.renderStars();
                    });
                    this.starDisplayEl.appendChild(star);
                }
            }

            submitRating() {
                if (this.currentRating === 0) {
                    this.showToast('Please select a rating');
                    return;
                }

                const today = this.getTodayString();
                const existingIndex = this.ratings.findIndex(r => r.date === today);

                if (existingIndex !== -1) {
                    this.ratings[existingIndex].rating = this.currentRating;
                } else {
                    this.ratings.push({
                        date: today,
                        rating: this.currentRating
                    });
                }

                this.saveRatings();
                this.showToast(`Today rated ${this.currentRating} ★`);
                this.resetForm();
                this.updateDisplay();
            }

            resetForm() {
                this.currentRating = 0;
                this.sliderEl.value = 0;
                this.ratingValueEl.textContent = 0;
                this.renderStars();
            }

            updateDisplay() {
                this.updateStats();
                this.updateTimeline();
            }

            updateStats() {
                const total = this.ratings.length;
                const sum = this.ratings.reduce((acc, r) => acc + r.rating, 0);
                const average = total > 0 ? (sum / total).toFixed(1) : 0;

                this.totalRatingsEl.textContent = total;
                this.averageRatingEl.textContent = average;
                this.totalStarsEl.textContent = sum;
            }

            updateTimeline() {
                const sorted = [...this.ratings].reverse();

                if (sorted.length === 0) {
                    this.timelineEl.innerHTML = '<div class="empty-state">No ratings yet. Submit one to begin.</div>';
                    return;
                }

                this.timelineEl.innerHTML = sorted.map((item, index) => `
                    <div class="timeline-item" style="animation-delay: ${index * 0.05}s">
                        <div class="timeline-date">${this.formatDate(item.date)}</div>
                        <div class="timeline-stars">${'★'.repeat(item.rating)}<span style="color: var(--text-light); opacity: 0.3;">${'★'.repeat(5 - item.rating)}</span></div>
                    </div>
                `).join('');
            }

            updateDate() {
                const options = { weekday: 'long', month: 'long', day: 'numeric' };
                const today = new Date().toLocaleDateString('en-US', options);
                this.dateDisplayEl.textContent = today;
            }

            getTodayString() {
                const date = new Date();
                return date.toISOString().split('T')[0];
            }

            formatDate(dateString) {
                const date = new Date(dateString + 'T00:00:00');
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            saveRatings() {
                localStorage.setItem('ratings', JSON.stringify(this.ratings));
            }

            loadRatings() {
                const stored = localStorage.getItem('ratings');
                return stored ? JSON.parse(stored) : [];
            }

            showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        }

        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            new RatingApp();
        });
    </script>
</body>
</html>
