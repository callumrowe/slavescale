<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devotion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0d0908;
            --wine: #3a0d1a;
            --blood: #6b1224;
            --gold: #c9a25b;
            --goldlight: #e6c884;
            --ivory: #ede0d0;
            --smoke: #a08d82;
            --serif: 'Cormorant Garamond', 'Didot', 'Bodoni MT', Georgia, 'Times New Roman', serif;
            --sans: 'Jost', 'Century Gothic', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: var(--serif);
            color: var(--ivory);
            background:
                radial-gradient(ellipse 90% 60% at 50% -10%, rgba(107, 18, 36, 0.55), transparent 60%),
                radial-gradient(ellipse 70% 50% at 50% 115%, rgba(58, 13, 26, 0.6), transparent 60%),
                var(--ink);
            background-attachment: fixed;
            min-height: 100%;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            padding: clamp(28px, 6vw, 72px) 20px 64px;
            display: flex;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 80% 80% at 50% 40%, transparent 55%, rgba(0, 0, 0, 0.5) 100%);
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            opacity: 0;
            animation: rise 1.2s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-weight: 500;
            font-size: clamp(48px, 14vw, 80px);
            line-height: 0.9;
            text-align: center;
            letter-spacing: 0.01em;
            margin: 0 0 40px;
            color: var(--ivory);
        }

        .card {
            border: 1px solid rgba(201, 162, 91, 0.28);
            background: linear-gradient(180deg, rgba(58, 13, 26, 0.34), rgba(13, 9, 8, 0.34));
            border-radius: 3px;
            padding: clamp(26px, 6vw, 40px) clamp(22px, 5vw, 36px);
            box-shadow: 0 24px 60px -30px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(230, 200, 132, 0.08);
        }

        .today-date {
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.34em;
            text-transform: uppercase;
            color: var(--smoke);
            text-align: center;
            margin-bottom: 4px;
        }

        .prompt {
            text-align: center;
            font-style: italic;
            font-size: 23px;
            color: var(--ivory);
            margin-bottom: 26px;
            min-height: 30px;
            transition: opacity 0.4s;
        }

        /* stars */
        .stars {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 3vw, 16px);
            margin-bottom: 8px;
        }

        .star {
            width: clamp(38px, 11vw, 52px);
            height: clamp(38px, 11vw, 52px);
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: var(--gold);
            transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .star svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }

        .star .fill {
            fill: transparent;
            stroke: rgba(201, 162, 91, 0.55);
            stroke-width: 1.2;
            transition: fill 0.5s ease, filter 0.5s ease, stroke 0.5s ease;
        }

        .star.lit .fill {
            fill: url(#goldgrad);
            stroke: var(--goldlight);
            filter: drop-shadow(0 0 9px rgba(230, 200, 132, 0.55));
        }

        .stars.selectable .star:hover {
            transform: translateY(-4px) scale(1.06);
        }

        .stars.selectable .star:active {
            transform: scale(0.94);
        }

        .star.bloom {
            animation: bloom 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes bloom {
            0% {
                transform: scale(0.7);
            }
            55% {
                transform: scale(1.22);
            }
            100% {
                transform: scale(1);
            }
        }

        .rating-word {
            text-align: center;
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gold);
            min-height: 16px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .rating-word.show {
            opacity: 0.9;
        }

        .seal-btn {
            margin-top: 22px;
            width: 100%;
            background: linear-gradient(180deg, rgba(107, 18, 36, 0.9), rgba(58, 13, 26, 0.9));
            color: var(--ivory);
            font-family: var(--sans);
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            border: 1px solid var(--gold);
            border-radius: 2px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.35s;
        }

        .seal-btn:hover:not(:disabled) {
            background: linear-gradient(180deg, var(--blood), var(--wine));
            box-shadow: 0 0 30px -8px rgba(201, 162, 91, 0.5);
            letter-spacing: 0.34em;
        }

        .seal-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* treasury */
        .treasury {
            text-align: center;
            margin: 44px 0 8px;
        }

        .treasury .label {
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.36em;
            text-transform: uppercase;
            color: var(--smoke);
        }

        .treasury .total {
            font-size: clamp(70px, 22vw, 110px);
            line-height: 1;
            font-weight: 500;
            margin: 6px 0 2px;
            color: var(--goldlight);
            text-shadow: 0 0 40px rgba(201, 162, 91, 0.4);
        }


        .ledger-head {
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.36em;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
            margin: 48px 0 20px;
        }

        .entry {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 18px 4px;
            border-top: 1px solid rgba(201, 162, 91, 0.14);
        }

        .entry:last-child {
            border-bottom: 1px solid rgba(201, 162, 91, 0.14);
        }

        .entry .date {
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--smoke);
            width: 78px;
            flex-shrink: 0;
            padding-top: 5px;
            line-height: 1.4;
        }

        .entry .body {
            flex: 1;
        }

        .entry .ministars {
            display: flex;
            gap: 3px;
            margin-bottom: 4px;
        }

        .entry .ministars span {
            color: var(--gold);
            font-size: 15px;
            letter-spacing: 1px;
        }

        .entry .ministars .empty {
            color: rgba(201, 162, 91, 0.25);
        }

        .empty-ledger {
            text-align: center;
            font-style: italic;
            color: var(--smoke);
            font-size: 18px;
            padding: 8px 0 4px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
        <defs>
            <linearGradient id="goldgrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f3dca0" />
                <stop offset="55%" stop-color="#e6c884" />
                <stop offset="100%" stop-color="#b8893f" />
            </linearGradient>
        </defs>
    </svg>

    <main class="page">
        <h1 class="title">Devotion</h1>

        <section class="card" id="tonight" aria-live="polite"></section>

        <section class="treasury">
            <div class="label">Stars</div>
            <div class="total" id="totalStars">0</div>
        </section>

        <div class="ledger-head">Record</div>
        <section id="ledger"></section>
    </main>

    <script>
        (function() {
            const KEY = 'devotion-log';
            const STAR_PATH = "M24 2 L30.2 16.4 L46 17.8 L34 28.4 L37.6 44 L24 35.6 L10.4 44 L14 28.4 L2 17.8 L17.8 16.4 Z";
            const WORDS = ["", "Barely", "Wanting", "Adequate", "Pleasing", "Exquisite"];

            let log = {};
            let draft = 0;
            let amending = false;

            const todayKey = () => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            const fmtDate = (key, opts) => {
                const [y, m, d] = key.split('-').map(Number);
                return new Date(y, m - 1, d).toLocaleDateString('en-US', opts);
            };

            async function loadLog() {
                try {
                    const r = await window.storage?.get(KEY);
                    if (r && r.value) log = JSON.parse(r.value);
                } catch (e) {
                    const stored = localStorage.getItem(KEY);
                    if (stored) log = JSON.parse(stored);
                }
            }

            async function saveLog() {
                try {
                    if (window.storage?.set) await window.storage.set(KEY, JSON.stringify(log));
                    else localStorage.setItem(KEY, JSON.stringify(log));
                } catch (e) {
                    console.error('Could not save', e);
                }
            }

            function starButtons(count, selectable) {
                let html = `<div class="stars${selectable ? ' selectable' : ''}" id="starRow">`;
                for (let i = 1; i <= 5; i++) {
                    html += `<button class="star${i <= count ? ' lit' : ''}" data-i="${i}" ${selectable ? '' : 'tabindex="-1" aria-hidden="true"'} aria-label="${i} star${i > 1 ? 's' : ''}">
                        <svg viewBox="0 0 48 46"><path class="fill" d="${STAR_PATH}"/></svg></button>`;
                }
                html += `</div>`;
                return html;
            }

            function paint(count) {
                document.querySelectorAll('#starRow .star').forEach(s => {
                    s.classList.toggle('lit', Number(s.dataset.i) <= count);
                });
            }

            function renderTonight() {
                const el = document.getElementById('tonight');
                const tk = todayKey();
                const sealed = log[tk];
                const dateLabel = fmtDate(tk, { weekday: 'long', month: 'long', day: 'numeric' });

                if (sealed && !amending) {
                    el.classList.add('sealed');
                    el.innerHTML = `
                        <div class="today-date">${dateLabel}</div>
                        <div class="prompt">Tonight's rating, sealed.</div>
                        ${starButtons(sealed.stars, false)}
                        <div class="rating-word show">${WORDS[sealed.stars]}</div>
                        <button class="seal-btn amend" id="amendBtn" style="margin-top:28px;background:none;border:none;color:var(--smoke);font-size:10px;padding:8px 0;box-shadow:none;">Change this rating</button>
                    `;
                    document.getElementById('amendBtn').addEventListener('click', () => {
                        amending = true;
                        draft = sealed.stars;
                        renderTonight();
                    });
                    return;
                }

                const existing = sealed || {};
                if (amending && draft === 0) draft = existing.stars || 0;
                el.innerHTML = `
                    <div class="today-date">${dateLabel}</div>
                    <div class="prompt" id="prompt">${draft ? WORDS[draft].toLowerCase() + '…' : 'awaiting your rating'}</div>
                    ${starButtons(draft, true)}
                    <div class="rating-word${draft ? ' show' : ''}" id="ratingWord">${draft ? WORDS[draft] : ''}</div>
                    <button class="seal-btn" id="sealBtn" ${draft ? '' : 'disabled'}>Record this rating</button>
                `;
                wireStars();
                document.getElementById('sealBtn').addEventListener('click', seal);
            }

            function wireStars() {
                const row = document.getElementById('starRow');
                const word = document.getElementById('ratingWord');
                const prompt = document.getElementById('prompt');
                const btn = document.getElementById('sealBtn');

                row.querySelectorAll('.star').forEach(star => {
                    const i = Number(star.dataset.i);
                    star.addEventListener('mouseenter', () => paint(i));
                    star.addEventListener('mouseleave', () => paint(draft));
                    star.addEventListener('click', () => {
                        draft = i;
                        paint(draft);
                        star.classList.remove('bloom');
                        void star.offsetWidth;
                        star.classList.add('bloom');
                        word.textContent = WORDS[draft];
                        word.classList.add('show');
                        prompt.textContent = WORDS[draft].toLowerCase() + '…';
                        btn.disabled = false;
                    });
                });
            }

            async function seal() {
                if (!draft) return;
                log[todayKey()] = { stars: draft, sealedAt: new Date().toISOString() };
                await saveLog();

                const lit = document.querySelectorAll('#starRow .star.lit');
                lit.forEach((s, idx) => {
                    setTimeout(() => {
                        s.classList.remove('bloom');
                        void s.offsetWidth;
                        s.classList.add('bloom');
                    }, idx * 90);
                });

                amending = false;
                draft = 0;
                setTimeout(() => {
                    renderTonight();
                    renderTreasury(true);
                    renderLedger();
                }, lit.length * 90 + 260);
            }

            function stats() {
                const keys = Object.keys(log);
                let total = 0;
                keys.forEach(k => (total += log[k].stars || 0));
                return { total, nights: keys.length };
            }

            function renderTreasury(animate) {
                const s = stats();
                const totalEl = document.getElementById('totalStars');

                if (animate) countUp(totalEl, s.total);
                else totalEl.textContent = s.total;
            }

            function countUp(el, to) {
                const from = Number(el.textContent) || 0;
                if (from === to) {
                    el.textContent = to;
                    return;
                }
                const dur = 900,
                    t0 = performance.now();

                function frame(now) {
                    const p = Math.min(1, (now - t0) / dur);
                    const eased = 1 - Math.pow(1 - p, 3);
                    el.textContent = Math.round(from + (to - from) * eased);
                    if (p < 1) requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);
            }

            function renderLedger() {
                const el = document.getElementById('ledger');
                const keys = Object.keys(log)
                    .sort()
                    .reverse();
                if (keys.length === 0) {
                    el.innerHTML = `<div class="empty-ledger">No nights recorded yet.</div>`;
                    return;
                }
                el.innerHTML = keys
                    .map(k => {
                        const e = log[k];
                        let mini = '';
                        for (let i = 1; i <= 5; i++) {
                            mini += `<span class="${i <= e.stars ? '' : 'empty'}">${i <= e.stars ? '★' : '☆'}</span>`;
                        }
                        return `<div class="entry">
                            <div class="date">${fmtDate(k, { month: 'short', day: 'numeric' })}<br>${fmtDate(k, { weekday: 'short' })}</div>
                            <div class="body"><div class="ministars">${mini}</div></div>
                        </div>`;
                    })
                    .join('');
            }

            async function init() {
                await loadLog();
                renderTonight();
                renderTreasury(false);
                renderLedger();
            }

            init();
        })();
    </script>
</body>
</html>

    <script>
        class RatingApp {
            constructor() {
                this.ratings = this.loadRatings();
                this.currentRating = 0;
                this.init();
            }

            init() {
                this.setupElements();
                this.setupEventListeners();
                this.updateDisplay();
                this.updateDate();
            }

            setupElements() {
                this.sliderEl = document.getElementById('ratingSlider');
                this.ratingValueEl = document.getElementById('ratingValue');
                this.starDisplayEl = document.getElementById('starDisplay');
                this.submitBtn = document.getElementById('submitBtn');
                this.timelineEl = document.getElementById('timeline');
                this.totalRatingsEl = document.getElementById('totalRatings');
                this.averageRatingEl = document.getElementById('averageRating');
                this.totalStarsEl = document.getElementById('totalStars');
                this.dateDisplayEl = document.getElementById('dateDisplay');
            }

            setupEventListeners() {
                this.sliderEl.addEventListener('input', (e) => this.handleSliderChange(e));
                this.submitBtn.addEventListener('click', () => this.submitRating());
                window.addEventListener('load', () => this.renderStars());
            }

            handleSliderChange(e) {
                this.currentRating = parseInt(e.target.value);
                this.ratingValueEl.textContent = this.currentRating;
                this.renderStars();
            }

            renderStars() {
                this.starDisplayEl.innerHTML = '';
                for (let i = 1; i <= 5; i++) {
                    const star = document.createElement('span');
                    star.className = `star ${i <= this.currentRating ? 'filled' : 'empty'}`;
                    star.textContent = '★';
                    star.addEventListener('click', () => {
                        this.currentRating = i;
                        this.sliderEl.value = i;
                        this.ratingValueEl.textContent = i;
                        this.renderStars();
                    });
                    this.starDisplayEl.appendChild(star);
                }
            }

            submitRating() {
                if (this.currentRating === 0) {
                    this.showToast('Please select a rating');
                    return;
                }

                const today = this.getTodayString();
                const existingIndex = this.ratings.findIndex(r => r.date === today);

                if (existingIndex !== -1) {
                    this.ratings[existingIndex].rating = this.currentRating;
                } else {
                    this.ratings.push({
                        date: today,
                        rating: this.currentRating
                    });
                }

                this.saveRatings();
                this.showToast(`Today rated ${this.currentRating} ★`);
                this.resetForm();
                this.updateDisplay();
            }

            resetForm() {
                this.currentRating = 0;
                this.sliderEl.value = 0;
                this.ratingValueEl.textContent = 0;
                this.renderStars();
            }

            updateDisplay() {
                this.updateStats();
                this.updateTimeline();
            }

            updateStats() {
                const total = this.ratings.length;
                const sum = this.ratings.reduce((acc, r) => acc + r.rating, 0);
                const average = total > 0 ? (sum / total).toFixed(1) : 0;

                this.totalRatingsEl.textContent = total;
                this.averageRatingEl.textContent = average;
                this.totalStarsEl.textContent = sum;
            }

            updateTimeline() {
                const sorted = [...this.ratings].reverse();

                if (sorted.length === 0) {
                    this.timelineEl.innerHTML = '<div class="empty-state">No ratings yet. Submit one to begin.</div>';
                    return;
                }

                this.timelineEl.innerHTML = sorted.map((item, index) => `
                    <div class="timeline-item" style="animation-delay: ${index * 0.05}s">
                        <div class="timeline-date">${this.formatDate(item.date)}</div>
                        <div class="timeline-stars">${'★'.repeat(item.rating)}<span style="color: var(--text-light); opacity: 0.3;">${'★'.repeat(5 - item.rating)}</span></div>
                    </div>
                `).join('');
            }

            updateDate() {
                const options = { weekday: 'long', month: 'long', day: 'numeric' };
                const today = new Date().toLocaleDateString('en-US', options);
                this.dateDisplayEl.textContent = today;
            }

            getTodayString() {
                const date = new Date();
                return date.toISOString().split('T')[0];
            }

            formatDate(dateString) {
                const date = new Date(dateString + 'T00:00:00');
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            saveRatings() {
                localStorage.setItem('ratings', JSON.stringify(this.ratings));
            }

            loadRatings() {
                const stored = localStorage.getItem('ratings');
                return stored ? JSON.parse(stored) : [];
            }

            showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        }

        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            new RatingApp();
        });
    </script>
</body>
</html>
