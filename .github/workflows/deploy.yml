name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 62.238.0.56
          username: root
          key: ${{ secrets.SLAVESCALE_DEPLOY_KEY }}
          script: |
            cd /opt/slavescale
            git pull origin main
            docker compose up --build -d
